<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تيتا لوئيس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* الإطار العام للعبة */
        #app-container { position: relative; width: 400px; height: 700px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); overflow: hidden; background-color: #87CEEB;}
        
        .hidden { display: none !important; }

        /* ================= 1. شاشة البداية ================= */
        #start-screen {
            position: absolute; width: 100%; height: 100%; z-index: 50;
            /* التعديل هنا: سحب صورتك كخلفية */
            background-image: url('start-bg.png'); 
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px;
        }
        
        /* زرار البداية */
        #start-btn {
            background: linear-gradient(to bottom, #FFC107, #FF9800);
            border: 3px solid #E65100; border-radius: 15px; padding: 15px 80px; font-size: 28px; font-weight: bold;
            color: black; cursor: pointer; box-shadow: 0 8px 0 #E65100; transition: transform 0.1s;
            z-index: 51;
        }
        #start-btn:active { transform: translateY(8px); box-shadow: none; }

        /* ================= 2. شاشة الفيديو ================= */
        #video-screen { position: absolute; width: 100%; height: 100%; z-index: 40; background: black; display: flex; align-items: center; justify-content: center;}
        #intro-video { width: 100%; }
        
        #skip-btn {
            position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.8);
            border: none; padding: 8px 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; z-index: 60;
        }
        #skip-btn:hover { background: white; }

        /* ================= 3. شاشة السباق ================= */
        #game-container { position: absolute; width: 100%; height: 100%; z-index: 10; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;}
        
        /* سيارة اللاعب */
        #player-car {
            position: absolute; bottom: 100px; width: 80px; height: auto; z-index: 5; pointer-events: none;
            left: 50%; transform: translateX(-50%); transition: left 0.2s ease-out;
        }

        /* سيارات المنافسين */
        .enemy-car {
            position: absolute; z-index: 4; pointer-events: none;
            top: 40%; transform: translateX(-50%); width: 20px;
        }

        /* العدادات */
        #ui-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-evenly; z-index: 10; pointer-events: none; }
        .stat-box { background: linear-gradient(to bottom, #2b4b6b, #152a40); color: white; padding: 8px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; text-align: center; border: 2px solid #4a90e2; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen">
        <button id="start-btn">ابدأ</button>
    </div>

    <div id="video-screen" class="hidden">
        <button id="skip-btn">تخطي ⏭️</button>
        <video id="intro-video" src="video.mp4" playsinline></video>
        <p style="color: white; position: absolute; z-index: 30;">جاري تحميل الفيديو...</p>
    </div>

    <div id="game-container" class="hidden">
        <div id="canvas-container"></div>
        
        <img src="car.png" id="player-car" alt="سيارة اللاعب">
        <img src="enemy.png" id="enemy-1" class="enemy-car" alt="منافس">

        <div id="ui-bar">
            <div class="stat-box">السرعة: <br><span id="speed">150</span> كم/س</div>
            <div class="stat-box">المركز: <br>1 / 6</div>
        </div>
    </div>

</div>

<script>
    // ================== التحكم في الشاشات ==================
    const startScreen = document.getElementById('start-screen');
    const videoScreen = document.getElementById('video-screen');
    const gameContainer = document.getElementById('game-container');
    const startBtn = document.getElementById('start-btn');
    const skipBtn = document.getElementById('skip-btn');
    const introVideo = document.getElementById('intro-video');

    let gameStarted = false; 

    startBtn.addEventListener('click', () => {
        startScreen.classList.add('hidden'); 
        videoScreen.classList.remove('hidden'); 
        introVideo.play().catch(e => console.log("الفيديو مش موجود، اضغط تخطي")); 
    });

    function enterGame() {
        if(gameStarted) return;
        gameStarted = true;
        introVideo.pause(); 
        videoScreen.classList.add('hidden'); 
        gameContainer.classList.remove('hidden'); 
        start3DGame(); 
    }

    skipBtn.addEventListener('click', enterGame);
    introVideo.addEventListener('ended', enterGame);

    // ================== محرك اللعبة ==================
    function start3DGame() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(75, 400 / 700, 0.1, 1000);
        camera.position.set(0, 7, 12); 
        camera.lookAt(0, 0, 0); 
        const renderer = new THREE.WebGLRenderer({ antialias: true }); 
        renderer.setSize(400, 700);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);

        const roadGeometry = new THREE.PlaneGeometry(15, 100); 
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.rotation.x = -Math.PI / 2; 
        scene.add(road);

        const lines = [];
        const lineGeo = new THREE.PlaneGeometry(0.3, 3);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for(let i = 0; i < 6; i++) {
            let lineL = new THREE.Mesh(lineGeo, lineMat);
            lineL.rotation.x = -Math.PI / 2; lineL.position.set(-2.5, 0.01, -i * 12); 
            scene.add(lineL); lines.push(lineL);
            
            let lineR = new THREE.Mesh(lineGeo, lineMat);
            lineR.rotation.x = -Math.PI / 2; lineR.position.set(2.5, 0.01, -i * 12); 
            scene.add(lineR); lines.push(lineR);
        }

        const lanes = [20, 50, 80]; 
        let currentLane = 1; 
        const playerCar = document.getElementById('player-car');

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentLane > 0) {
                currentLane--; 
            } else if (e.key === 'ArrowRight' && currentLane < 2) {
                currentLane++; 
            }
            playerCar.style.left = lanes[currentLane] + '%';
        });

        const enemyCar = document.getElementById('enemy-1');
        let enemyLane = 0; 
        let enemyZ = 0; 

        let isPaused = false;
        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                lines.forEach(line => {
                    line.position.z += 0.3;
                    if (line.position.z > 12) line.position.z = -48; 
                });

                enemyZ += 0.008; 
                if(enemyZ > 1) { 
                    enemyZ = 0; 
                    enemyLane = Math.floor(Math.random() * 3); 
                }

                let size = 20 + (enemyZ * 100); 
                let topPos = 40 + (enemyZ * 70); 
                let targetLeft = lanes[enemyLane];
                let centerDiff = targetLeft - 50; 
                let perspectiveLeft = 50 + (centerDiff * (0.2 + enemyZ * 0.8));

                enemyCar.style.width = size + 'px';
                enemyCar.style.top = topPos + '%';
                enemyCar.style.left = perspectiveLeft + '%';
            }
            renderer.render(scene, camera);
        }
        animate();
    }
</script>
</body>
</html>
